services:
  - type: web
    name: splitmate-api
    env: java
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/splitmate-api-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
